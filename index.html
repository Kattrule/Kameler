<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamelkaravanen Custom Graphics</title>
    <style>
        :root {
            --desert-sand: #f4a460;
            --desert-dark: #8b4513;
            --text-color: #3e2723;
            --bg-color: #ffdead;
            --p1-color: #2563eb;
            --p2-color: #dc2626;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; 
            touch-action: none; 
        }

        .header { text-align: center; margin: 10px 0; }
        h1 { margin: 0; font-size: 1.2rem; color: var(--desert-dark); }
        
        .score-board {
            display: flex; justify-content: center; gap: 20px;
            font-size: 1rem; font-weight: bold;
        }

        .p1-score { color: var(--p1-color); }
        .p2-score { color: var(--p2-color); }

        .game-layout {
            display: flex; flex-direction: row; align-items: center; justify-content: center;
            gap: 10px; width: 100%; max-width: 900px;
        }

        canvas {
            background-color: var(--desert-sand);
            border: 4px solid var(--desert-dark);
            border-radius: 8px;
            display: block;
            touch-action: none;
            image-rendering: pixelated; /* Behåller skarpa kanter om dina ikoner är pixelart */
        }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 222, 173, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; text-align: center; padding: 20px;
        }

        .hidden { display: none !important; }

        .controls {
            display: grid; grid-template-columns: repeat(3, 65px); grid-template-rows: repeat(3, 65px); gap: 8px;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }

        .btn {
            color: white; border: none; border-radius: 12px;
            font-size: 1.5rem; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .p1-btn { background-color: var(--p1-color); box-shadow: 0 4px 0 #1e40af; }
        .p2-btn { background-color: var(--p2-color); box-shadow: 0 4px 0 #991b1b; }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #000;
            filter: brightness(1.2);
        }

        #p1Up, #p2Up { grid-column: 2; grid-row: 1; }
        #p1Left, #p2Left { grid-column: 1; grid-row: 2; }
        #p1Right, #p2Right { grid-column: 3; grid-row: 2; }
        #p1Down, #p2Down { grid-column: 2; grid-row: 3; }

        .action-btn {
            background: var(--desert-dark); color: white; padding: 15px;
            border-radius: 8px; font-weight: bold; border: none; cursor: pointer;
        }

        @media (max-width: 750px) {
            .game-layout { flex-direction: column; }
            .controls { grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Kamelkaravanen 🐫</h1>
    <div class="score-board">
        <div id="score1" class="p1-score">P1: 1</div>
        <div id="score2" class="p2-score hidden">P2: 1</div>
    </div>
</div>

<div class="game-layout">
    <div id="p1Pad" class="controls">
        <button class="btn p1-btn" id="p1Up">⬆️</button>
        <button class="btn p1-btn" id="p1Left">⬅️</button>
        <button class="btn p1-btn" id="p1Right">➡️</button>
        <button class="btn p1-btn" id="p1Down">⬇️</button>
    </div>

    <div style="position: relative;">
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        
        <div id="startScreen" class="overlay">
            <label>Fart: <span id="speedValue">64</span></label>
            <input type="range" id="speedSlider" min="1" max="128" value="64" style="width:200px; margin: 15px;">
            <button class="action-btn" onclick="startGame('single')">1 SPELARE</button>
            <button class="action-btn" style="background:#4b5563; margin-top:10px;" onclick="startGame('multi')">2 SPELARE</button>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <h2 id="winnerText">KROCK!</h2>
            <button class="action-btn" onclick="showMenu()">MENY</button>
        </div>
    </div>

    <div id="p2Pad" class="controls hidden">
        <button class="btn p2-btn" id="p2Up">W</button>
        <button class="btn p2-btn" id="p2Left">A</button>
        <button class="btn p2-btn" id="p2Right">D</button>
        <button class="btn p2-btn" id="p2Down">S</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const speedSlider = document.getElementById("speedSlider");
    const speedValue = document.getElementById("speedValue");

    const box = 20; // Storlek på rutorna (dina bilder skalas automatiskt till 20x20)
    const canvasSize = 300;
    
    // --- BILD-INSTÄLLNINGAR ---
    // Ändra filnamnen här så att de stämmer med bilderna i ditt GitHub-repo.
    // Tips: Använd transparenta PNG-bilder!
    
    function laddaBild(src) {
        let img = new Image();
        img.src = src;
        return img;
    }

    const grafik = {
        p1: {
            head: {
                UP: laddaBild("p1-head-up.png"),
                DOWN: laddaBild("p1-head-down.png"),
                LEFT: laddaBild("p1-head-left.png"),
                RIGHT: laddaBild("p1-head-right.png")
            },
            body: {
                UP: laddaBild("p1-body-up.png"),
                DOWN: laddaBild("p1-body-down.png"),
                LEFT: laddaBild("p1-body-left.png"),
                RIGHT: laddaBild("p1-body-right.png")
            }
        },
        p2: {
            head: {
                UP: laddaBild("p2-head-up.png"),
                DOWN: laddaBild("p2-head-down.png"),
                LEFT: laddaBild("p2-head-left.png"),
                RIGHT: laddaBild("p2-head-right.png")
            },
            body: {
                UP: laddaBild("p2-body-up.png"),
                DOWN: laddaBild("p2-body-down.png"),
                LEFT: laddaBild("p2-body-left.png"),
                RIGHT: laddaBild("p2-body-right.png")
            }
        }
    };
    // -------------------------

    let mode, gameInterval, food;
    let p1Queue = [];
    let p2Queue = [];
    
    let snake1, dir1, p1Alive;
    let snake2, dir2, p2Alive;

    speedSlider.oninput = () => speedValue.innerText = speedSlider.value;

    function showMenu() {
        document.getElementById("gameOverScreen").classList.add("hidden");
        document.getElementById("startScreen").classList.remove("hidden");
    }

    function startGame(sMode) {
        mode = sMode;
        document.getElementById("startScreen").classList.add("hidden");
        document.getElementById("gameOverScreen").classList.add("hidden");

        snake1 = [{x: 2*box, y: 7*box}];
        dir1 = "RIGHT"; p1Alive = true; p1Queue = [];
        document.getElementById("score1").innerText = "P1: 1";
        
        if(mode === 'multi') {
            snake2 = [{x: 12*box, y: 7*box}];
            dir2 = "LEFT"; p2Alive = true; p2Queue = [];
            document.getElementById("p2Pad").classList.remove("hidden");
            document.getElementById("score2").classList.remove("hidden");
            document.getElementById("score2").innerText = "P2: 1";
        } else {
            p2Alive = false;
            document.getElementById("p2Pad").classList.add("hidden");
            document.getElementById("score2").classList.add("hidden");
        }

        spawnFood();
        const ms = 350 - (parseInt(speedSlider.value) * 2.4);
        if(gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(draw, ms);
    }

    function spawnFood() {
        food = {
            x: Math.floor(Math.random() * (canvasSize/box)) * box,
            y: Math.floor(Math.random() * (canvasSize/box)) * box
        };
    }

    function draw() {
        if (p1Queue.length > 0) {
            const next = p1Queue.shift();
            if (next === "LEFT" && dir1 !== "RIGHT") dir1 = "LEFT";
            if (next === "UP" && dir1 !== "DOWN") dir1 = "UP";
            if (next === "RIGHT" && dir1 !== "LEFT") dir1 = "RIGHT";
            if (next === "DOWN" && dir1 !== "UP") dir1 = "DOWN";
        }

        if (p2Queue.length > 0) {
            const next = p2Queue.shift();
            if (next === "LEFT" && dir2 !== "RIGHT") dir2 = "LEFT";
            if (next === "UP" && dir2 !== "DOWN") dir2 = "UP";
            if (next === "RIGHT" && dir2 !== "LEFT") dir2 = "RIGHT";
            if (next === "DOWN" && dir2 !== "UP") dir2 = "DOWN";
        }

        moveSnake(snake1, dir1, p1Alive, 1);
        if (mode === 'multi') moveSnake(snake2, dir2, p2Alive, 2);

        if (checkCollision()) return;

        // Rita öknen
        ctx.fillStyle = "#f4a460";
        ctx.fillRect(0, 0, canvasSize, canvasSize);
        
        // Rita maten (Emoji tills vidare, byt ut mot ctx.drawImage om du vill ha egen mat-ikon)
        ctx.font = "18px Arial";
        ctx.fillText("🌴", food.x + 1, food.y + 16); 
        
        // Rita kamelerna
        if (p1Alive || mode === 'single') drawSnake(snake1, dir1, grafik.p1, 1);
        if (mode === 'multi' && p2Alive) drawSnake(snake2, dir2, grafik.p2, 2);
    }

    function moveSnake(s, d, alive, playerNum) {
        if (!alive) return;
        let head = {x: s[0].x, y: s[0].y};
        if(d === "LEFT") head.x -= box;
        if(d === "UP") head.y -= box;
        if(d === "RIGHT") head.x += box;
        if(d === "DOWN") head.y += box;
        
        s.unshift(head);
        if(head.x === food.x && head.y === food.y) {
            if (playerNum === 1) document.getElementById("score1").innerText = "P1: " + s.length;
            if (playerNum === 2) document.getElementById("score2").innerText = "P2: " + s.length;
            spawnFood();
        } else {
            s.pop();
        }
    }

    function checkCollision() {
        const h1 = snake1[0];
        if(h1.x < 0 || h1.x >= canvasSize || h1.y < 0 || h1.y >= canvasSize) return die(mode === 'multi' ? "P2 VANN!" : "KROCK!");
        if(snake1.slice(1).some(s => s.x === h1.x && s.y === h1.y)) return die(mode === 'multi' ? "P2 VANN!" : "KROCK!");

        if(mode === 'multi') {
            const h2 = snake2[0];
            if(h2.x < 0 || h2.x >= canvasSize || h2.y < 0 || h2.y >= canvasSize) return die("P1 VANN!");
            if(snake2.slice(1).some(s => s.x === h2.x && s.y === h2.y)) return die("P1 VANN!");
            
            if(snake2.some(s => s.x === h1.x && s.y === h1.y)) return die("RÖD VANN!");
            if(snake1.some(s => s.x === h2.x && s.y === h2.y)) return die("BLÅ VANN!");
        }
        return false;
    }

    function die(msg) {
        clearInterval(gameInterval);
        document.getElementById("winnerText").innerText = msg;
        document.getElementById("gameOverScreen").classList.remove("hidden");
        return true;
    }

    // --- HÄR ÄR LOGIKEN FÖR RÄTT BILD ---
    function drawSnake(s, currentDir, playerGrafik, playerNum) {
        s.forEach((seg, i) => {
            let segDir = currentDir;
            let imgToDraw;

            if (i === 0) {
                // Huvudet tittar alltid i den riktning spelaren är på väg
                imgToDraw = playerGrafik.head[currentDir];
            } else {
                // För kroppsdelarna: räkna ut var föregående del är och peka dit
                let prevSeg = s[i - 1];
                if (prevSeg.x > seg.x) segDir = "RIGHT";
                else if (prevSeg.x < seg.x) segDir = "LEFT";
                else if (prevSeg.y > seg.y) segDir = "DOWN";
                else if (prevSeg.y < seg.y) segDir = "UP";
                
                imgToDraw = playerGrafik.body[segDir];
            }

            // Rita bilden om den är laddad, annars rita en tillfällig färgad fyrkant
            if (imgToDraw.complete && imgToDraw.naturalHeight !== 0) {
                ctx.drawImage(imgToDraw, seg.x, seg.y, box, box);
            } else {
                ctx.fillStyle = playerNum === 1 ? "#2563eb" : "#dc2626";
                ctx.fillRect(seg.x, seg.y, box, box);
            }
        });
    }

    function press(player, d) {
        if (navigator.vibrate) navigator.vibrate(10);
        if(player === 1) {
            if(p1Queue.length < 2) p1Queue.push(d);
        } else {
            if(p2Queue.length < 2) p2Queue.push(d);
        }
    }

    const p1Map = { "p1Up": "UP", "p1Down": "DOWN", "p1Left": "LEFT", "p1Right": "RIGHT" };
    Object.keys(p1Map).forEach(id => {
        document.getElementById(id).addEventListener("pointerdown", (e) => {
            e.preventDefault(); press(1, p1Map[id]);
        });
    });

    const p2Map = { "p2Up": "UP", "p2Down": "DOWN", "p2Left": "LEFT", "p2Right": "RIGHT" };
    Object.keys(p2Map).forEach(id => {
        document.getElementById(id).addEventListener("pointerdown", (e) => {
            e.preventDefault(); press(2, p2Map[id]);
        });
    });

    document.addEventListener("keydown", e => {
        const k = e.key.toLowerCase();
        
        if (mode === 'single') {
            if(k === 'arrowup' || k === 'w') press(1, "UP"); 
            if(k === 'arrowdown' || k === 's') press(1, "DOWN");
            if(k === 'arrowleft' || k === 'a') press(1, "LEFT"); 
            if(k === 'arrowright' || k === 'd') press(1, "RIGHT");
        } else {
            if(k === 'arrowup') press(1, "UP"); 
            if(k === 'arrowdown') press(1, "DOWN");
            if(k === 'arrowleft') press(1, "LEFT"); 
            if(k === 'arrowright') press(1, "RIGHT");
            
            if(k === 'w') press(2, "UP"); 
            if(k === 's') press(2, "DOWN");
            if(k === 'a') press(2, "LEFT"); 
            if(k === 'd') press(2, "RIGHT");
        }
    });

</script>
</body>
</html>
