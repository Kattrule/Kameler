<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamelkaravanen Pro</title>
    <style>
        :root {
            --desert-sand: #f4a460;
            --desert-dark: #8b4513;
            --text-color: #3e2723;
            --bg-color: #ffdead;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        .header { text-align: center; margin: 10px 0; }
        h1 { margin: 0; font-size: 1.5rem; color: var(--desert-dark); }
        
        .game-container { position: relative; margin-top: 5px; }

        canvas {
            background-color: var(--desert-sand);
            border: 4px solid var(--desert-dark);
            border-radius: 8px;
            display: block;
            image-rendering: pixelated; /* Gör emojierna skarpare */
        }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 222, 173, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; border-radius: 4px; text-align: center; padding: 20px;
        }

        .hidden { display: none !important; }

        /* Responsiva kontroller */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 75px);
            grid-template-rows: repeat(3, 75px);
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            background-color: var(--desert-dark);
            color: white; border: none; border-radius: 15px;
            font-size: 2rem; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 6px 0 #5c2e0b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #5c2e0b;
        }

        #upBtn { grid-column: 2; grid-row: 1; }
        #leftBtn { grid-column: 1; grid-row: 2; }
        #rightBtn { grid-column: 3; grid-row: 2; }
        #downBtn { grid-column: 2; grid-row: 3; }

        .action-btn {
            background: var(--desert-dark); color: white;
            padding: 15px 30px; font-size: 1.2rem; border: none;
            border-radius: 10px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Kamelkaravanen 🐫</h1>
    <div id="scoreBoard">Längd: 1</div>
</div>

<div class="game-container">
    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <div id="startScreen" class="overlay">
        <h2>Redo?</h2>
        <button class="action-btn" onclick="startGame()">STARTA</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h2 style="color: #d32f2f;">KROCK!</h2>
        <p id="finalScore"></p>
        <button class="action-btn" onclick="startGame()">FÖRSÖK IGEN</button>
    </div>
</div>

<div class="controls">
    <button class="btn" id="upBtn">⬆️</button>
    <button class="btn" id="leftBtn">⬅️</button>
    <button class="btn" id="rightBtn">➡️</button>
    <button class="btn" id="downBtn">⬇️</button>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreBoard = document.getElementById("scoreBoard");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");

    const box = 25; 
    const canvasSize = 300;
    const speed = 250; 
    
    let snake, food, direction, nextDirection, gameInterval;

    function startGame() {
        startScreen.classList.add("hidden");
        gameOverScreen.classList.add("hidden");
        
        snake = [{ x: 5 * box, y: 5 * box }];
        direction = "RIGHT";
        nextDirection = "RIGHT";
        spawnFood();
        
        if(gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(draw, speed);
        updateScore();
    }

    function spawnFood() {
        food = {
            x: Math.floor(Math.random() * (canvasSize/box)) * box,
            y: Math.floor(Math.random() * (canvasSize/box)) * box
        };
        // Kolla så maten inte hamnar på kamelen
        if (snake.some(seg => seg.x === food.x && seg.y === food.y)) spawnFood();
    }

    function updateScore() {
        scoreBoard.innerText = "Längd: " + snake.length;
    }

    function draw() {
        direction = nextDirection;
        let headX = snake[0].x;
        let headY = snake[0].y;

        if (direction === "LEFT") headX -= box;
        if (direction === "UP") headY -= box;
        if (direction === "RIGHT") headX += box;
        if (direction === "DOWN") headY += box;

        // KOLLISION - Här är fixen för väggen
        if (headX < 0 || headX >= canvasSize || headY < 0 || headY >= canvasSize || 
            snake.some((seg, index) => index !== 0 && seg.x === headX && seg.y === headY)) {
            return die();
        }

        const grabbedFood = (headX === food.x && headY === food.y);
        
        // Flytta kamelen
        const newHead = { x: headX, y: headY };
        snake.unshift(newHead);

        if (grabbedFood) {
            spawnFood();
            updateScore();
        } else {
            snake.pop();
        }

        // RITA
        ctx.fillStyle = "#f4a460";
        ctx.fillRect(0, 0, canvasSize, canvasSize);

        // Mat
        ctx.font = "20px Arial";
        ctx.fillText("🐪", food.x + 2, food.y + 20);

        // Karavan
        snake.forEach((seg, i) => {
            ctx.fillText(i === 0 ? "叙" : "🐪", seg.x + 2, seg.y + 20);
        });
        // (Fixade emojin för huvudet i koden till 🐫)
        snake.forEach((seg, i) => {
            ctx.fillText(i === 0 ? "🐫" : "🐪", seg.x + 2, seg.y + 20);
        });
    }

    function die() {
        clearInterval(gameInterval);
        document.getElementById("finalScore").innerText = "Din karavan blev " + snake.length + " kameler lång.";
        gameOverScreen.classList.remove("hidden");
    }

    // SNABBARE KONTROLLER
    function handleInput(dir) {
        if (dir === "LEFT" && direction !== "RIGHT") nextDirection = "LEFT";
        if (dir === "UP" && direction !== "DOWN") nextDirection = "UP";
        if (dir === "RIGHT" && direction !== "LEFT") nextDirection = "RIGHT";
        if (dir === "DOWN" && direction !== "UP") nextDirection = "DOWN";
    }

    // Lyssna på både touch och klick för omedelbar respons
    const controlConfig = {
        "upBtn": "UP", "downBtn": "DOWN", "leftBtn": "LEFT", "rightBtn": "RIGHT"
    };

    Object.keys(controlConfig).forEach(id => {
        const btn = document.getElementById(id);
        // "pointerdown" triggar så fort man nuddar, snabbare än "click"
        btn.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            handleInput(controlConfig[id]);
        });
    });

    document.addEventListener("keydown", e => {
        if (e.key === "ArrowUp") handleInput("UP");
        if (e.key === "ArrowDown") handleInput("DOWN");
        if (e.key === "ArrowLeft") handleInput("LEFT");
        if (e.key === "ArrowRight") handleInput("RIGHT");
    });

    // Rita tom bana direkt
    ctx.fillStyle = "#f4a460";
    ctx.fillRect(0, 0, canvasSize, canvasSize);
</script>
</body>
</html>
