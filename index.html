<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamelkaravanen Perfekt Passform</title>
    <style>
        :root {
            --grass: #4caf50;
            --sand: #f4d03f;
            --p1-color: #2196f3;
            --p2-color: #f44336;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #1a1a1a;
            color: white; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        /* MENY */
        .menu-card {
            background: #2c3e50; padding: 20px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-top: 10vh; width: 85%; max-width: 350px;
            display: flex; flex-direction: column; gap: 15px;
            border: 2px solid #34495e; position: absolute; z-index: 100;
        }

        .menu-row { display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; }
        
        .action-btn {
            background: var(--sand); color: #000; font-weight: bold; font-size: 1.1rem;
            padding: 12px; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 0 #c2a632;
        }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }

        /* SPELPLAN (Helt ny responsiv lösning) */
        #canvasContainer {
            width: 95vw; /* Fyller 95% av skärmens bredd */
            max-width: 500px; /* Blir inte större än 500px på dator */
            aspect-ratio: 1 / 1; /* Håller den ALLTID perfekt fyrkantig */
            margin-top: 10px;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #333;
            background: var(--grass);
            flex-shrink: 0; /* Förhindrar att den trycks ihop */
        }

        canvas { 
            width: 100%; 
            height: 100%; 
            display: block; 
            image-rendering: pixelated; 
        }

        /* KNAPPAR */
        .controls-container {
            display: flex; justify-content: space-around; width: 100%; max-width: 600px;
            padding: 15px 0; margin-top: auto; margin-bottom: 10px;
        }

        .d-pad {
            display: grid; grid-template-columns: repeat(3, 65px); grid-template-rows: repeat(2, 65px); gap: 10px;
        }

        .game-btn {
            background: #444; color: white; border: none; border-radius: 15px;
            font-size: 1.8rem; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 0 #222;
        }
        .game-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #111; background: #555; }
        
        .p1-btn { border-bottom: 4px solid var(--p1-color); }
        .p2-btn { border-bottom: 4px solid var(--p2-color); }

        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }

        .hidden { display: none !important; }
        .overlay { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
    </style>
</head>
<body>

<div class="menu-card" id="menu">
    <h2 style="margin:0; text-align:center; color:var(--sand);">KAMELKARAVANEN</h2>
    <div class="menu-row">
        <span>Bredd (rutor):</span>
        <input type="number" id="gridInput" value="15" style="width:60px; font-size:1.1rem; text-align:center;">
    </div>
    <div class="menu-row">
        <span>Fart:</span>
        <input type="range" id="speedSlider" min="1" max="100" value="60">
    </div>
    <div style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
        <button class="action-btn" onclick="startGame('single')">1 SPELARE</button>
        <button class="action-btn" style="background:#95a5a6; box-shadow: 0 4px 0 #7f8c8d;" onclick="startGame('multi')">2 SPELARE</button>
    </div>
</div>

<div id="canvasContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="gameOver" class="overlay hidden">
        <h1 id="status" style="color:var(--p2-color)">KROCK!</h1>
        <button class="action-btn" onclick="location.reload()">MENY</button>
    </div>
</div>

<div class="controls-container">
    <div id="p1Pad" class="d-pad">
        <button class="game-btn p1-btn up" onpointerdown="press(1,'UP')">▲</button>
        <button class="game-btn p1-btn left" onpointerdown="press(1,'LEFT')">◀</button>
        <button class="game-btn p1-btn down" onpointerdown="press(1,'DOWN')">▼</button>
        <button class="game-btn p1-btn right" onpointerdown="press(1,'RIGHT')">▶</button>
    </div>

    <div id="p2Pad" class="d-pad hidden">
        <button class="game-btn p2-btn up" onpointerdown="press(2,'UP')">W</button>
        <button class="game-btn p2-btn left" onpointerdown="press(2,'LEFT')">A</button>
        <button class="game-btn p2-btn down" onpointerdown="press(2,'DOWN')">S</button>
        <button class="game-btn p2-btn right" onpointerdown="press(2,'RIGHT')">D</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // Vi sätter en fast, hög inre upplösning på canvasen för att undvika fula renderingar
    const box = 40; 
    let gridCount, snake1, dir1, p1Queue, snake2, dir2, p2Queue, food, gameInterval, mode;

    function ladda(src) { const img = new Image(); img.src = src; return img; }

    const gfx = {
        p1: { body: ladda("p1-kropp.png"), tailB: ladda("p1-svans-biten.png"), tailH: ladda("p1-svans-obiten.png"), hF: ladda("p1-huvud-fram.png"), hU: ladda("p1-huvud-upp.png"), hD: ladda("p1-huvud-ner.png") },
        p2: { body: ladda("p2-kropp.png"), tailB: ladda("p2-svans-biten.png"), tailH: ladda("p2-svans-obiten.png"), hF: ladda("p2-huvud-fram.png"), hU: ladda("p2-huvud-upp.png"), hD: ladda("p2-huvud-ner.png") }
    };

    function startGame(m) {
        mode = m;
        gridCount = parseInt(document.getElementById("gridInput").value) || 15;
        
        // Canvasens inre storlek räknas ut exakt (CSS krymper den sedan snyggt till skärmen)
        canvas.width = gridCount * box;
        canvas.height = gridCount * box;

        document.getElementById("menu").classList.add("hidden");
        if(mode === 'multi') document.getElementById("p2Pad").classList.remove("hidden");

        snake1 = [{x: 2*box, y: 2*box}]; dir1 = "RIGHT"; p1Queue = [];
        if(mode === 'multi') { snake2 = [{x: (gridCount-3)*box, y: (gridCount-3)*box}]; dir2 = "LEFT"; p2Queue = []; }

        spawnFood();
        const speed = 250 - (document.getElementById("speedSlider").value * 2);
        gameInterval = setInterval(draw, speed);
    }

    function spawnFood() {
        food = { x: Math.floor(Math.random() * gridCount) * box, y: Math.floor(Math.random() * gridCount) * box };
    }

    function draw() {
        updateLogic();
        ctx.fillStyle = "#4caf50";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.font = (box * 0.8) + "px Arial";
        ctx.fillText("🍎", food.x + box*0.1, food.y + box*0.8);

        renderSnake(snake1, dir1, gfx.p1, p1Queue);
        if(mode === 'multi') renderSnake(snake2, dir2, gfx.p2, p2Queue);
    }

    function renderSnake(snake, currentDir, pGfx, queue) {
        for(let i = 0; i < snake.length; i++) {
            let seg = snake[i];
            let moveDir = currentDir;
            if (i > 0) {
                let front = snake[i-1];
                if (front.x > seg.x) moveDir = "RIGHT"; else if (front.x < seg.x) moveDir = "LEFT";
                else if (front.y > seg.y) moveDir = "DOWN"; else if (front.y < seg.y) moveDir = "UP";
            }

            ctx.save();
            ctx.translate(seg.x + box/2, seg.y + box/2);
            if (moveDir === "LEFT") ctx.scale(-1, 1);
            else if (moveDir === "UP") ctx.rotate(-Math.PI/2);
            else if (moveDir === "DOWN") ctx.rotate(Math.PI/2);

            // RITA LAGER. Notera 'box + 1.5' för att tvinga fram överlappning och ta bort glipor!
            let drawOverlap = (img) => {
                if(img && img.complete) {
                    ctx.drawImage(img, -box/2, -box/2, box + 1.5, box + 1.5);
                }
            }

            drawOverlap(pGfx.body);
            let tail = (i === snake.length - 1) ? pGfx.tailH : pGfx.tailB;
            drawOverlap(tail);

            let h = pGfx.hF;
            if (i === 0 && queue.length > 0) {
                if(queue[0] === "UP") h = pGfx.hU; else if(queue[0] === "DOWN") h = pGfx.hD;
            }
            drawOverlap(h);

            ctx.restore();
        }
    }

    function updateLogic() {
        if(p1Queue.length > 0) {
            let n = p1Queue.shift();
            if((n==="UP"&&dir1!=="DOWN") || (n==="DOWN"&&dir1!=="UP") || (n==="LEFT"&&dir1!=="RIGHT") || (n==="RIGHT"&&dir1!=="LEFT")) dir1=n;
        }
        move(snake1, dir1, 1);

        if(mode === 'multi') {
            if(p2Queue.length > 0) {
                let n = p2Queue.shift();
                if((n==="UP"&&dir2!=="DOWN") || (n==="DOWN"&&dir2!=="UP") || (n==="LEFT"&&dir2!=="RIGHT") || (n==="RIGHT"&&dir2!=="LEFT")) dir2=n;
            }
            move(snake2, dir2, 2);
        }
    }

    function move(s, d, pNum) {
        let head = {x: s[0].x, y: s[0].y};
        if(d === "UP") head.y -= box; else if(d === "DOWN") head.y += box;
        else if(d === "LEFT") head.x -= box; else if(d === "RIGHT") head.x += box;

        if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || s.some(seg => seg.x === head.x && seg.y === head.y)) {
            die(pNum === 1 ? "P2 VANN!" : "P1 VANN!");
        }

        s.unshift(head);
        if(head.x === food.x && head.y === food.y) spawnFood();
        else s.pop();
    }

    function die(msg) { clearInterval(gameInterval); document.getElementById("status").innerText = msg; document.getElementById("gameOver").classList.remove("hidden"); }
    function press(p, d) { if(p === 1) p1Queue.push(d); else p2Queue.push(d); }
</script>
</body>
</html>
