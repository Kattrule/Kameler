<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamelkaravanen - Alla har huvuden</title>
    <style>
        :root {
            --grass-green: #2e7d32; 
            --desert-dark: #1b5e20;
            --bg-color: #1b3022;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; touch-action: none; 
        }

        .menu-area {
            background: rgba(0,0,0,0.5);
            padding: 15px; border-radius: 10px; margin: 5px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
            z-index: 20;
        }

        canvas {
            background-color: var(--grass-green);
            border: 4px solid var(--desert-dark);
            image-rendering: pixelated;
            max-width: 95vw; max-height: 50vh;
        }

        /* MOBILKNAPPAR - Fixad placering */
        .controls-container {
            display: flex; flex-direction: row; justify-content: center; 
            gap: 40px; width: 100%; padding: 10px;
        }

        .controls {
            display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px); gap: 10px;
        }

        .btn {
            background: #444; color: white; border: none; border-radius: 12px;
            font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 0 #222; touch-action: none;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }

        .hidden { display: none !important; }
        .overlay { position: absolute; top: 20%; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px; text-align: center; z-index: 100; }
    </style>
</head>
<body>

<div class="menu-area" id="menu">
    <div style="display:flex; flex-direction:column; align-items:center;">
        <label>Bredd på banan (rutor):</label>
        <input type="number" id="gridInput" value="20" style="width:80px; font-size:1.2rem; text-align:center;">
    </div>
    <button onclick="startGame('single')" style="padding:10px 20px;">STARTA SPEL</button>
</div>

<div style="position: relative; display: flex; justify-content: center;">
    <canvas id="gameCanvas"></canvas>
    <div id="gameOver" class="overlay hidden">
        <h2 id="status" style="color: #ff5252;">KROCK!</h2>
        <button onclick="location.reload()" style="padding:10px 20px; font-size:1.1rem;">Tillbaka till meny</button>
    </div>
</div>

<div class="controls-container">
    <div id="p1Pad" class="controls">
        <button class="btn up" onpointerdown="press(1,'UP')">↑</button>
        <button class="btn left" onpointerdown="press(1,'LEFT')">←</button>
        <button class="btn down" onpointerdown="press(1,'DOWN')">↓</button>
        <button class="btn right" onpointerdown="press(1,'RIGHT')">→</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const box = 12; 
    
    let gridCount = 20;
    let snake1, dir1, p1Queue = [];
    let food, gameInterval;

    function ladda(src) {
        const img = new Image();
        img.src = src;
        return img;
    }

    const gfx = {
        p1: {
            body: ladda("p1-kropp.png"),
            tailBiten: ladda("p1-svans-biten.png"),
            tailHel: ladda("p1-svans-obiten.png"),
            hHead: ladda("p1-huvud-fram.png"),
            hUp: ladda("p1-huvud-upp.png"),
            hDown: ladda("p1-huvud-ner.png")
        }
    };

    function startGame(m) {
        gridCount = parseInt(document.getElementById("gridInput").value) || 20;
        canvas.width = canvas.height = gridCount * box;
        document.getElementById("menu").classList.add("hidden");

        snake1 = [{x: Math.floor(gridCount/2)*box, y: Math.floor(gridCount/2)*box}];
        dir1 = "RIGHT";
        spawnFood();
        gameInterval = setInterval(draw, 150);
    }

    function spawnFood() {
        food = {
            x: Math.floor(Math.random() * gridCount) * box,
            y: Math.floor(Math.random() * gridCount) * box
        };
    }

    function draw() {
        updatePos();
        ctx.fillStyle = "#2e7d32";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        
        ctx.font = "10px Arial";
        ctx.fillText("🐫", food.x, food.y + 10);

        // RITA VARJE KAMEL I KARAVANEN
        for(let i = 0; i < snake1.length; i++) {
            let seg = snake1[i];
            let moveDir = dir1; 

            // Hitta riktningen för just denna kamel
            if (i > 0) {
                let front = snake1[i-1];
                if (front.x > seg.x) moveDir = "RIGHT";
                else if (front.x < seg.x) moveDir = "LEFT";
                else if (front.y > seg.y) moveDir = "DOWN";
                else if (front.y < seg.y) moveDir = "UP";
            }

            ctx.save();
            ctx.translate(seg.x + box/2, seg.y + box/2);

            // ROTERA (Men bara om vi inte svänger, enligt ditt önskemål)
            // Om den går horisontellt, spegelvänd vid vänster
            if (moveDir === "LEFT") ctx.scale(-1, 1);
            // Om den går vertikalt, rotera 90 grader
            else if (moveDir === "UP") ctx.rotate(-Math.PI/2);
            else if (moveDir === "DOWN") ctx.rotate(Math.PI/2);

            // 1. RITA KROPPEN
            drawImg(gfx.p1.body);

            // 2. RITA SVANSEN (Längst bak i karavanen = hel, annars biten)
            if (i === snake1.length - 1) {
                drawImg(gfx.p1.tailHel);
            } else {
                drawImg(gfx.p1.tailBiten);
            }

            // 3. RITA HUVUDET
            let headImg = gfx.p1.hHead;
            
            // Kolla om kamelen precis framför har svängt (Hörn-logik)
            if (i === 0 && p1Queue.length > 0) {
                let next = p1Queue[0];
                if ((moveDir === "RIGHT" || moveDir === "LEFT")) {
                    if(next === "UP") headImg = gfx.p1.hUp;
                    if(next === "DOWN") headImg = gfx.p1.hDown;
                }
            }
            drawImg(headImg);

            ctx.restore();
        }
    }

    function drawImg(img) {
        if(img.complete) ctx.drawImage(img, -box/2, -box/2, box, box);
    }

    function updatePos() {
        if(p1Queue.length > 0) {
            let n = p1Queue.shift();
            if(n==="UP" && dir1!=="DOWN") dir1=n;
            if(n==="DOWN" && dir1!=="UP") dir1=n;
            if(n==="LEFT" && dir1!=="RIGHT") dir1=n;
            if(n==="RIGHT" && dir1!=="LEFT") dir1=n;
        }

        let head = {...snake1[0]};
        if(dir1 === "UP") head.y -= box;
        if(dir1 === "DOWN") head.y += box;
        if(dir1 === "LEFT") head.x -= box;
        if(dir1 === "RIGHT") head.x += box;

        if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || 
           snake1.some(s => s.x === head.x && s.y === head.y)) {
            die();
        }

        snake1.unshift(head);
        if(head.x === food.x && head.y === food.y) spawnFood();
        else snake1.pop();
    }

    function die() {
        clearInterval(gameInterval);
        document.getElementById("gameOver").classList.remove("hidden");
    }

    function press(p, d) {
        if(p === 1) p1Queue.push(d);
    }
</script>
</body>
</html>
